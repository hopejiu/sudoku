<span id="class-hseparator"></span><h1>HSeparator<a class="headerlink" href="#hseparator" title="Link to this heading"></a></h1>
<p><strong>Inherits:</strong> <a class="reference internal" href="class_separator.html#class-separator"><span class="std std-ref">Separator</span></a> <strong>&lt;</strong> <a class="reference internal" href="class_control.html#class-control"><span class="std std-ref">Control</span></a> <strong>&lt;</strong> <a class="reference internal" href="class_canvasitem.html#class-canvasitem"><span class="std std-ref">CanvasItem</span></a> <strong>&lt;</strong> <a class="reference internal" href="class_node.html#class-node"><span class="std std-ref">Node</span></a> <strong>&lt;</strong> <a class="reference internal" href="class_object.html#class-object"><span class="std std-ref">Object</span></a></p>
<p>A horizontal line used for separating other controls.</p>
<section class="classref-introduction-group" id="description">
<h2>Description<a class="headerlink" href="#description" title="Link to this heading"></a></h2>
<p>A horizontal separator used for separating other controls that are arranged <strong>vertically</strong>. <strong>HSeparator</strong> is purely visual and normally drawn as a <a class="reference internal" href="class_styleboxline.html#class-styleboxline"><span class="std std-ref">StyleBoxLine</span></a>.</p>
