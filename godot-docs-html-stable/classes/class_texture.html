<section class="classref-introduction-group" id="description">
<h2>Description<a class="headerlink" href="#description" title="Link to this heading"></a></h2>
<p><strong>Texture</strong> is the base class for all texture types. Common texture types are <a class="reference internal" href="class_texture2d.html#class-texture2d"><span class="std std-ref">Texture2D</span></a> and <a class="reference internal" href="class_imagetexture.html#class-imagetexture"><span class="std std-ref">ImageTexture</span></a>. See also <a class="reference internal" href="class_image.html#class-image"><span class="std std-ref">Image</span></a>.</p>
